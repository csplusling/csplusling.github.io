<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CS+L Webring</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .member {
      border: 1px solid black;
      padding: 10px;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user img {
      width: 32px;
      height: 32px;
    }

    .site {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .site img {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>

  <h1>CS+Ling Webring</h1>
  <p><a href="#" id="random-site">Random Site</a></p>

  <div class="container">
    <div class="grid">

      <!-- MEMBER -->

    </div>
  </div>

  <script>
    function redirectToRandom() {
      const sites = Array.from(new Set(Array.from(document.querySelectorAll('.member .site a')).map(a => a.href)));
      if (sites.length > 0) {
        const randomUrl = sites[Math.floor(Math.random() * sites.length)];
        window.location.href = randomUrl;
      }
    }

    document.getElementById('random-site').addEventListener('click', function(e) {
      e.preventDefault();
      redirectToRandom();
    });

    if (window.location.search.includes('random')) {
      redirectToRandom();
    }
  </script>
