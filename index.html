<script>
    function redirect(action, url) {
      const sites = Array.from(new Set(Array.from(document.querySelectorAll('.member .site a')).map(a => a.href)));
      if (sites.length === 0) return;
      
      if (action === 'random') {
        const randomUrl = sites[Math.floor(Math.random() * sites.length)];
        window.location.href = randomUrl;
        return;
      }
      
      const normalize = (u) => {
        try {
            const urlObj = new URL(u);
            return urlObj.origin + urlObj.pathname.replace(/\/$/, '');
        } catch(e) {
            return u.replace(/\/$/, '');
        }
      };
      
      let currentIndex = -1;
      const currentSiteUrl = url || document.referrer;
      if (currentSiteUrl) {
        const normalizedUrl = normalize(currentSiteUrl);
        currentIndex = sites.findIndex(s => normalize(s) === normalizedUrl);
      }
      
      if (currentIndex === -1) {
        window.location.href = sites[0]; 
        return;
      }
      
      if (action === 'prev') {
        const prevIndex = (currentIndex - 1 + sites.length) % sites.length;
        window.location.href = sites[prevIndex];
      } else if (action === 'next') {
        const nextIndex = (currentIndex + 1) % sites.length;
        window.location.href = sites[nextIndex];
      }
    }

    document.getElementById('random-site').addEventListener('click', function(e) {
      e.preventDefault();
      redirect('random');
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('random')) {
      redirect('random');
    } else if (urlParams.has('action')) {
      redirect(urlParams.get('action'), urlParams.get('url'));
    }
  </script>
